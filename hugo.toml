baseURL = 'https://blog.pedroosilva.dev'
languageCode = 'en-us'
title = 'Pedro Silva - Software Engineer'
theme  = 'PaperMod'
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

# SEO and performance settings
[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

[permalinks]
  posts = '/posts/:slug/'

# This block fixes the "can't evaluate field Author" error
[params]
    env = "production" # to enable local features
    title = "Pedro Silva - Software Engineer"
    description = "Software engineer Pedro Silva shares insights on AWS, TypeScript, browser extensions, and modern web development. Learn from real-world projects and career experiences."
    author = "Pedro Silva"
    keywords = ["Pedro Silva", "software engineer", "AWS developer", "TypeScript", "web development", "browser extensions", "cloud architecture"]
    
    # Schema markup configuration
    [params.schema]
        publisherType = "Person"
        sameAs = [
            "https://github.com/PedroS11",
            "https://twitter.com/iterm11_",
            "https://stackoverflow.com/users/9661304/pedro-silva",
            "https://www.linkedin.com/in/pedro-oliveira-silva"
        ]

    # SEO and Open Graph settings
    images = ["images/pedro-silva-og.jpg"]
    defaultTheme = "auto"
    
    # Open Graph configuration
    [params.cover]
        linkFullImages = true
        
    [params.profileMode]
        enabled = false
    
    # Asset configuration
    [params.assets]
        favicon = "favicon.ico"
        favicon16x16 = "favicon-16x16.png"
        favicon32x32 = "favicon-32x32.png"
        apple_touch_icon = "apple-touch-icon.png"
        safari_pinned_tab = "safari-pinned-tab.svg"
        theme_color = "#2e2e33"
        msapplication_TileColor = "#2e2e33"
    ShowReadingTime = true
    ShowShareButtons = true
    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowWordCount = true
    ShowRssButtonInSectionTermList = true
    UseHugoToc = true
    disableSpecial1stPost = false
    disableScrollToTop = false
    comments = false
    hidemeta = false
    hideSummary = false
    showtoc = false
    tocopen = false

    [params.homeInfoParams]
    Title = "Hey, I'm Pedro! 👋🏻"
    Content = """
**Software Engineer** working with **AWS cloud architecture** and **TypeScript development**.

🚀 Currently building scalable e-commerce systems at **Mindera**  
🎓 Master's in Computer Science from FEUP (2018)  
💻 Creator of [Twitch Live Extension](/posts/twitch-live-extension/) with 20k+ users
☁️ Using AWS, Node.js, and modern web development
"""
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/PedroS11"

    [[params.socialIcons]]
        name = "twitter"
        url = "https://twitter.com/iterm11_"

    [[params.socialIcons]]
        name = "stackoverflow"
        url = "https://stackoverflow.com/users/9661304/pedro-silva"

    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/pedro-oliveira-silva"

# Navigation Menu
[menu]
    [[menu.main]]
        identifier = "search"
        name = "Search"
        url = "/search/"
        weight = 10
    [[menu.main]]
        identifier = "archives"
        name = "Archive"
        url = "/archives/"
        weight = 5
    [[menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags/"
        weight = 5

# This provides a fallback for the RSS feed template
[author]
    name = "Pedro Silva"
    email = "pedrosilva1137work@gmail.com"
    bio = "Software Engineer specializing in AWS, TypeScript, and modern web development. Building scalable solutions and sharing knowledge through code."
    image = "https://blog.pedroosilva.dev/images/pedro-silva-avatar.jpg"

[outputs]
home = [ "HTML", "RSS", "JSON" ]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
      hardWraps = false
      xhtml = false
    [markup.goldmark.parser]
      attribute = true
      autoHeadingID = true
      autoHeadingIDType = "github"

[caches]
  [caches.images]
    dir = ':cacheDir/images'